<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Propinas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Propinas</h1>
        <div class="calculator">
            <div class="input-group">
                <label for="bill">Monto de la cuenta ($)</label>
                <input type="number" id="bill" placeholder="0.00" step="0.01">
            </div>
            
            <div class="input-group">
                <label for="tip">Porcentaje de propina (%)</label>
                <input type="number" id="tip" placeholder="15" value="15">
            </div>

            <div class="results">
                <div class="result-item">
                    <span>Propina:</span>
                    <span id="tip-amount">$0.00</span>
                </div>
                <div class="result-item total">
                    <span>Total a pagar:</span>
                    <span id="total-amount">$0.00</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
