<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Propinas Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <header>
            <h1>Calculadora de Propinas</h1>
            <p>Calcula y divide de forma sencilla</p>
        </header>

        <main class="calculator-card">
            <div class="input-section">
                <div class="input-group">
                    <label for="bill">Monto de la cuenta</label>
                    <div class="input-wrapper">
                        <span class="currency">$</span>
                        <input type="number" id="bill" placeholder="0.00" step="0.01">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="tip">Porcentaje de propina (%)</label>
                    <input type="range" id="tip-slider" min="0" max="50" value="15" class="slider">
                    <div class="tip-value-display">
                        <input type="number" id="tip" value="15">
                        <span>%</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="people">¿Entre cuántas personas?</label>
                    <div class="input-wrapper">
                        <input type="number" id="people" value="1" min="1">
                        <span class="unit">Pers.</span>
                    </div>
                </div>
            </div>

            <div class="display-section">
                <div class="result-card">
                    <div class="result-row">
                        <div class="label">
                            <h3>Propina</h3>
                            <span>por persona</span>
                        </div>
                        <div class="amount" id="tip-per-person">$0.00</div>
                    </div>

                    <div class="result-row">
                        <div class="label">
                            <h3>Total</h3>
                            <span>por persona</span>
                        </div>
                        <div class="amount highlight" id="total-per-person">$0.00</div>
                    </div>

                    <hr>

                    <div class="result-row summary">
                        <div class="label">Total General</div>
                        <div class="amount" id="total-bill">$0.00</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
